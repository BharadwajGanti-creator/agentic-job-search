name: Daily job search
on:
  schedule:
    - cron: '0 6 * * *'      # 06:00 UTC daily
  workflow_dispatch:          # manual trigger for testing
permissions:
  contents: write             # required to commit the JSON back
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Write resume profile
        working-directory: JobSearchAgent        # ← your project folder
        env:
          RESUME_PROFILE_JSON: ${{ secrets.RESUME_PROFILE_JSON }}
        run: printf '%s' "$RESUME_PROFILE_JSON" > resume_profile.json

      - name: Run agent
        working-directory: JobSearchAgent        # ← your project folder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: dotnet run -- cron

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add JobSearchAgent/wwwroot/latest_matches.json
          git diff --staged --quiet || git commit -m "Daily matches $(date -u +%F)"
          git push